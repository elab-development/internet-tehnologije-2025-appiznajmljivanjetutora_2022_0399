services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tutor_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://app:app@db:3306/tutor_app
      JWT_SECRET: promeni_ovaj_jak_tajni_kljuc
    ports:
      - "3000:3000"

  db:
    image: mysql:8.0
    container_name: tutor_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tutor_app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:


