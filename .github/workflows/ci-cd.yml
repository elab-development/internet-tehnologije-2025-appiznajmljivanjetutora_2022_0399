name: CI-CD

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  quality:
    name: Lint Test Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: mysql://app:app@localhost:3307/tutor_app
          JWT_SECRET: ci-secret
          RESEND_API_KEY: ""
          RESEND_FROM_EMAIL: ""
          GOOGLE_CALENDAR_ID: ""
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ""
          GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ""

  docker:
    name: Docker Build (and Push on main/develop)
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tutor-booking-app:${{ github.sha }} .

      - name: Login to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="ghcr.io/${OWNER}/internet-tehnologije-2025-appiznajmljivanjetutora_2022_0399:${GITHUB_SHA}"
          docker tag tutor-booking-app:${GITHUB_SHA} "${IMAGE}"
          docker push "${IMAGE}"

  deploy:
    name: Deploy to Render (main only)
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deploy Hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Skip deploy (missing secret)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL == '' }}
        run: echo "RENDER_DEPLOY_HOOK_URL is not configured, skipping deployment."
