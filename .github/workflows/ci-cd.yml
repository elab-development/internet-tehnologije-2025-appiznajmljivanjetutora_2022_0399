name: CI-CD

on:
  push:
  pull_request:

jobs:
  test-and-build:
    name: Test and Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build app
        run: npm run build
        env:
          DATABASE_URL: mysql://app:app@localhost:3307/tutor_app
          JWT_SECRET: ci-secret
          RESEND_API_KEY: ""
          RESEND_FROM_EMAIL: ""
          GOOGLE_CALENDAR_ID: ""
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ""
          GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ""

      - name: Build Docker image
        run: docker build -t tutor-booking-app:${{ github.sha }} .